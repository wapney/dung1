<head>
    <meta charset="UTF-8">

</head>
<body>
    <h1>My Store</h1>
    <table border="2"  cellspacing="1" cellpadding="1" >
        <tr>
            <th>Item Photo</th>
            <th>Name</th>
            <th>Price</th>
        </tr>
        <tr>
            <td> <img width="100" height="100" src="https://www.quanta.org/thumbs/thumb-orange-640x480-orange.jpg" alt=""></td>
            <td>Oranges</td>
            <td>$1 ea.</td>
        </tr>
        <tr>
            <td><img width="100" height="100" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Banana-Single.jpg/960px-Banana-Single.jpg" alt=""></td>
            <td>Bananas</td>
            <td>$0.75/lb</td>

        </tr>
        <tr>
            <td><img width="100" height="100" src="https://www.healthyfood.com/wp-content/uploads/2017/03/What_to_do_with_broccoli-1-500x375.jpg" alt=""></td>

        </tr>
    </table>
    <hr>
    <h1>Booking Form</h1>
    <div>
        <form action="nowhere">
            <label for="">Name: </label>
            <input type="text"><br><br>
            <label for="">Email</label>
            <input type="email"><br><br>
            <label for="">Phone: </label>
            <input type="tel"><br><br>
            <label for="">Date: </label>
            <input type="date"><br><br>
            <label for="">Time: </label>
            <input type="time"><br><br>
            <label for="">Number of Guest: </label>
            <input type="text"><br><br>
            <button >Submit</button>

        </form>
    </div>
    <hr>
    <h1>
        Car Purchase Form
    </h1>
    <div>
        <form action="nowhere">
            <label for="">Name: </label>
            <input type="text"><br><br>
            <label for="">Email</label>
            <input type="email"><br><br>
            <label for="">Phone: </label>
            <input type="tel"><br><br>
         
        
    
        <label for="car">Choose a Car: </label>
        <select name="car" id="car">           
            <option value="model1">Model 1</option>
            <option value="model2">Model 2</option>
            <option value="model3">Model3</option>
        </select>
        <br><br>
        <label for="carcolor">Choose a Color: </label>
        <select name="carcolor" id="carcolor">           
            <option value="mod">Red</option>
            <option value="mod1">Blue</option>
            <option value="mod2">Purple</option>
        </select>
        <br><br>
        <label for="">Quality: </label>
        <input type="text"><br><br>
        <label for="">Delivery Date</label>
        <input type="date"><br><br>
        <button>Submit</button>

        </form>
    </div>

    
</body>
</html>
